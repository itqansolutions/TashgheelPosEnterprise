<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="favicon.png">
  <title data-i18n-key="register_title">Register - Tashgheel POS</title>
  <link rel="stylesheet" href="css/tailwind.css">
  <link rel="stylesheet" href="css/styles.css">
  <script src="js/translations.js"></script>
</head>

<body class="min-h-screen flex flex-col items-center justify-center bg-gradient-to-br from-brand-dark-2 to-brand-dark font-sans m-0 relative overflow-hidden">

  <!-- Background decorative elements -->
  <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-brand-purple rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-pulse"></div>
  <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-brand-blue rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-pulse" style="animation-delay: 2s;"></div>

  <!-- Language Switcher -->
  <div class="absolute top-5 right-5 flex gap-2 z-10">
    <button class="lang-btn px-4 py-2 bg-white/10 backdrop-blur-sm text-white border border-white/20 rounded-lg text-sm cursor-pointer transition-all hover:bg-white/20" onclick="setLanguage('en')">English</button>
    <button class="lang-btn px-4 py-2 bg-white/10 backdrop-blur-sm text-white border border-white/20 rounded-lg text-sm cursor-pointer transition-all hover:bg-white/20" onclick="setLanguage('ar')">العربية</button>
  </div>

  <!-- Register Card -->
  <div class="bg-white/95 backdrop-blur-lg p-10 rounded-3xl shadow-premium w-full max-w-md text-center z-10 animate-slide-up border border-white/50">
    <h2 class="text-3xl font-extrabold text-brand-dark mb-6 tracking-tight" data-i18n-key="register_title">تسجيل حساب جديد</h2>

    <form id="registerForm" class="text-right">
      <div class="mb-5">
        <label class="block mb-1.5 text-gray-700 text-sm font-semibold" data-i18n-key="business_name">اسم النشاط التجاري</label>
        <input
          type="text"
          id="businessName"
          required
          class="w-full px-4 py-3 border border-gray-200 rounded-xl text-base bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-brand-blue/50 focus:border-brand-blue transition-all"
        >
      </div>
      <div class="mb-5">
        <label class="block mb-1.5 text-gray-700 text-sm font-semibold" data-i18n-key="business_email">البريد الإلكتروني للنشاط</label>
        <input
          type="email"
          id="email"
          required
          class="w-full px-4 py-3 border border-gray-200 rounded-xl text-base bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-brand-blue/50 focus:border-brand-blue transition-all"
        >
      </div>
      <div class="mb-5">
        <label class="block mb-1.5 text-gray-700 text-sm font-semibold" data-i18n-key="phone">رقم الهاتف</label>
        <input
          type="tel"
          id="phone"
          required
          class="w-full px-4 py-3 border border-gray-200 rounded-xl text-base bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-brand-blue/50 focus:border-brand-blue transition-all"
        >
      </div>
      <div class="mb-5">
        <label class="block mb-1.5 text-gray-700 text-sm font-semibold" data-i18n-key="username_manager">اسم المستخدم (للمدير)</label>
        <input
          type="text"
          id="username"
          required
          class="w-full px-4 py-3 border border-gray-200 rounded-xl text-base bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-brand-blue/50 focus:border-brand-blue transition-all"
        >
      </div>
      <div class="mb-6">
        <label class="block mb-1.5 text-gray-700 text-sm font-semibold" data-i18n-key="password">كلمة المرور</label>
        <input
          type="password"
          id="password"
          required
          class="w-full px-4 py-3 border border-gray-200 rounded-xl text-base bg-gray-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-brand-blue/50 focus:border-brand-blue transition-all"
        >
      </div>

      <button
        type="submit"
        class="w-full py-3.5 bg-gradient-to-r from-brand-purple to-brand-blue text-white rounded-xl text-base font-bold shadow-lg hover:shadow-xl hover:scale-[1.02] transform transition-all mt-2"
        data-i18n-key="start_trial_btn"
      >بدء الفترة التجريبية (3 أيام)</button>

      <div id="registerMsg" class="mt-3 text-sm min-h-[1.25rem]"></div>
    </form>

    <a href="index.html" class="mt-5 block text-brand-purple text-sm hover:text-brand-purple-dark hover:underline transition-colors" data-i18n-key="have_account">
      لديك حساب بالفعل؟ تسجيل الدخول
    </a>
  </div>

  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msgDiv = document.getElementById('registerMsg');

      const data = {
        businessName: document.getElementById('businessName').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        username: document.getElementById('username').value,
        password: document.getElementById('password').value
      };

      try {
        const response = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        const result = await response.json();

        if (response.ok) {
          // Success! Show confirmation UI
          const form = document.getElementById('registerForm');
          const card = form.parentElement;
          
          card.innerHTML = `
            <div class="py-8 animate-slide-up">
              <div class="bg-green-50 border border-green-200 text-brand-green-dark p-6 rounded-2xl mb-8 shadow-sm">
                <div class="text-5xl mb-4">✅</div>
                <h2 class="text-2xl font-extrabold mb-2 tracking-tight" data-i18n-key="register_success_title">${getTranslation('register_success_title')}</h2>
                <p class="text-sm font-medium text-gray-600" data-i18n-key="register_success_msg">${getTranslation('register_success_msg')}</p>
              </div>
              <a href="index.html" class="block w-full py-3.5 bg-gradient-to-r from-brand-purple to-brand-blue text-white rounded-xl text-base font-bold shadow-lg hover:shadow-xl hover:scale-[1.02] transform transition-all" data-i18n-key="go_to_login">
                ${getTranslation('go_to_login')}
              </a>
            </div>
          `;
        } else {
          msgDiv.textContent = '❌ ' + (result.msg || getTranslation('register_error') || 'حدث خطأ');
          msgDiv.className = 'mt-3 text-sm min-h-[1.25rem] text-brand-red';
        }
      } catch (error) {
        console.error('Error:', error);
        msgDiv.textContent = '❌ ' + (getTranslation('connection_error') || 'خطأ في الاتصال');
        msgDiv.className = 'mt-3 text-sm min-h-[1.25rem] text-brand-red';
      }
    });
  </script>
</body>

</html>
