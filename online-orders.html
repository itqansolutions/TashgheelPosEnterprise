<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Online Orders - Tashgheel POS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Outfit', sans-serif; background: #f0f4f8; }
    .glass-panel { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.3); box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05); }
    .tab-btn { border-bottom: 2px solid transparent; transition: all 0.3s; }
    .tab-btn.active { border-bottom-color: #8b5cf6; color: #8b5cf6; font-weight: 700; }
  </style>
</head>
<body class="text-gray-800 h-screen flex overflow-hidden">
  
  <!-- Sidebar -->
  <aside class="w-64 glass-panel flex flex-col justify-between z-10">
    <div>
      <div class="p-6 text-center">
        <h1 class="text-2xl font-extrabold text-brand-dark tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-brand-blue to-brand-purple">Tashgheel</h1>
        <p class="text-xs font-semibold text-gray-500 uppercase tracking-widest mt-1">Orders Desk</p>
      </div>
      <nav class="mt-4 px-4 flex flex-col gap-2">
        <a href="pos.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-white hover:shadow-sm transition-all font-semibold"><i class="fas fa-cash-register w-5"></i> POS</a>
        <a href="admin.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-white hover:shadow-sm transition-all font-semibold"><i class="fas fa-chart-line w-5"></i> Dashboard</a>
        <a href="products.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-white hover:shadow-sm transition-all font-semibold"><i class="fas fa-box w-5"></i> Inventory</a>
        <a href="online-orders.html" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-purple-50 text-brand-purple shadow-sm transition-all font-bold"><i class="fas fa-shopping-cart w-5"></i> Online Orders</a>
        <a href="ecommerce.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-white hover:shadow-sm transition-all font-semibold"><i class="fas fa-plug w-5"></i> Integrations</a>
      </nav>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 flex flex-col relative overflow-hidden">
    <!-- Header -->
    <header class="glass-panel px-8 py-5 flex justify-between items-center z-10 relative">
      <div>
        <h2 class="text-2xl font-bold text-gray-800">Order Management</h2>
        <p class="text-sm text-gray-500">Manage all your multi-channel online orders</p>
      </div>
      <div class="flex gap-4">
        <select id="platform-filter" class="premium-input rounded-xl bg-white/50 border border-white px-4 py-2" onchange="renderOrders()">
            <option value="all">All Platforms</option>
            <option value="woocommerce">WooCommerce</option>
            <option value="amazon">Amazon</option>
            <option value="noon">Noon</option>
            <option value="jumia">Jumia</option>
        </select>
        <button onclick="loadOrders()" class="bg-brand-blue text-white px-6 py-2 rounded-xl font-bold hover:bg-blue-600 shadow-lg shadow-blue-500/30 transition-all"><i class="fas fa-sync-alt mr-2"></i> Refresh</button>
      </div>
    </header>

    <!-- Tabs & Content -->
    <div class="flex-1 p-8 overflow-auto z-10 relative">
      
      <div class="flex gap-6 border-b border-gray-200 mb-6">
        <button class="tab-btn active px-4 py-3 font-semibold text-gray-500" onclick="setTab('pending', this)">Pending <span id="badge-pending" class="ml-2 bg-yellow-100 text-yellow-700 py-0.5 px-2 rounded-full text-xs">0</span></button>
        <button class="tab-btn px-4 py-3 font-semibold text-gray-500" onclick="setTab('accepted', this)">Accepted <span id="badge-accepted" class="ml-2 bg-green-100 text-green-700 py-0.5 px-2 rounded-full text-xs">0</span></button>
        <button class="tab-btn px-4 py-3 font-semibold text-gray-500" onclick="setTab('rejected', this)">Rejected <span id="badge-rejected" class="ml-2 bg-red-100 text-red-700 py-0.5 px-2 rounded-full text-xs">0</span></button>
        <button class="tab-btn px-4 py-3 font-semibold text-gray-500" onclick="setTab('all', this)">All Orders</button>
      </div>

      <div class="glass-panel rounded-2xl overflow-hidden shadow-sm">
        <table class="w-full text-left">
            <thead class="bg-gray-50/50 text-xs uppercase font-bold text-gray-400">
                <tr>
                    <th class="px-6 py-4">Platform</th>
                    <th class="px-6 py-4">Order ID</th>
                    <th class="px-6 py-4">Customer</th>
                    <th class="px-6 py-4">Amount</th>
                    <th class="px-6 py-4">Status</th>
                    <th class="px-6 py-4">Date</th>
                    <th class="px-6 py-4"></th>
                </tr>
            </thead>
            <tbody id="orders-body" class="divide-y divide-gray-100/50">
                <!-- Data -->
            </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Order Modal -->
  <div id="orderModal" class="fixed inset-0 bg-gray-900/40 backdrop-blur-sm z-[9999] hidden items-center justify-center">
      <div class="bg-white rounded-3xl w-full max-w-3xl overflow-hidden shadow-2xl animate-fade-in-up">
          <div class="p-8 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
              <div class="flex items-center gap-4">
                  <div id="modal-platform-icon" class="text-3xl"></div>
                  <div>
                      <h3 class="text-xl font-bold text-gray-800">Order #<span id="modal-order-number"></span></h3>
                      <p class="text-xs text-gray-500" id="modal-order-date"></p>
                  </div>
              </div>
              <button onclick="closeOrderModal()" class="text-gray-400 hover:text-gray-600 bg-white shadow-sm p-2 rounded-xl"><i class="fas fa-times w-5 h-5 flex items-center justify-center"></i></button>
          </div>
          
          <div class="p-8 grid grid-cols-3 gap-8">
              <div class="col-span-2">
                  <h4 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-4">Items</h4>
                  <div id="modal-items-list" class="space-y-3 max-h-[300px] overflow-y-auto pr-2 custom-scrollbar"></div>
              </div>
              <div>
                  <h4 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-4">Customer</h4>
                  <div class="bg-blue-50/50 p-4 rounded-2xl border border-blue-100">
                      <div class="font-bold text-gray-800" id="modal-customer-name"></div>
                      <div class="text-sm text-gray-500 mt-1" id="modal-customer-phone"></div>
                      <div class="text-sm text-gray-500 mt-1" id="modal-customer-email"></div>
                      <hr class="my-3 border-blue-100">
                      <div class="text-xs font-medium text-gray-600 leading-relaxed" id="modal-shipping-address"></div>
                  </div>

                  <h4 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-4 mt-6">Summary</h4>
                  <div class="bg-gray-50 p-4 rounded-2xl space-y-2 border border-gray-100">
                      <div class="flex justify-between text-sm text-gray-500"><span>Subtotal</span><span id="modal-subtotal" class="font-bold"></span></div>
                      <div class="flex justify-between text-sm text-gray-500"><span>Shipping</span><span id="modal-shipping" class="font-bold"></span></div>
                      <div class="flex justify-between text-sm text-gray-500"><span>Discount</span><span id="modal-discount" class="font-bold text-green-600"></span></div>
                      <hr class="my-2 border-gray-200">
                      <div class="flex justify-between text-lg font-bold text-brand-dark"><span>Total</span><span id="modal-total" class="text-brand-purple"></span></div>
                  </div>
              </div>
          </div>

          <div class="p-6 bg-gray-50 border-t border-gray-100 flex justify-end gap-3" id="modal-actions">
              <button onclick="rejectOrder()" class="px-6 py-3 rounded-xl font-bold text-red-600 bg-red-50 hover:bg-red-100 transition-all">Reject Order</button>
              <button onclick="acceptOrder()" class="px-6 py-3 rounded-xl font-bold text-white bg-brand-green hover:bg-green-600 shadow-lg shadow-green-500/30 transition-all">Accept Order</button>
          </div>
      </div>
  </div>

  <script>
      tailwind.config = {
          theme: {
              extend: {
                  colors: {
                      brand: { blue: '#3b82f6', purple: '#8b5cf6', dark: '#0f172a', green: '#10b981', 'green-dark': '#059669', orange: '#f97316' }
                  }
              }
          }
      }
  </script>
  <script src="js/auth.js"></script>
  <script src="js/online-orders-app.js"></script>
</body>
</html>
