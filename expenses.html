<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="favicon.png">
  <title data-i18n-key="expenses" data-i18n-ar="المصاريف">Expenses</title>
  <link rel="stylesheet" href="css/expenses.css">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/tailwind.css">
  <script src="js/translations.js"></script>
  <script defer src="js/expenses-app.js"></script>
</head>

<body>
  <!-- Language Switcher -->
  <div class="language-switcher">
    <button class="lang-btn" onclick="setLanguage('en')" id="langEn">English</button>
    <button class="lang-btn" onclick="setLanguage('ar')" id="langAr">العربية</button>
  </div>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2 id="posSystemTitle">🏪Tasgheel POS System</h2>
        <p id="licensedVersion">Enterprise Edition</p>
      </div>
      <nav>
        <a href="pos.html" class="nav-item" data-i18n-key="nav_pos" data-i18n-ar="نقطة البيع">🛒 Point of Sale</a>
        <a href="products.html" class="nav-item" data-i18n-key="nav_products" data-i18n-ar="المنتجات">📦 Products</a>
        <a href="receipts.html" class="nav-item" data-i18n-key="nav_receipts" data-i18n-ar="الفواتير">🧾 Receipts</a>
        <a href="reports.html" class="nav-item" data-i18n-key="nav_reports" data-i18n-ar="التقارير">📈 Reports</a>
        <a href="salesmen.html" class="nav-item" data-i18n-key="nav_salesmen" data-i18n-ar="البائعون">🧑‍💼 Salesmen</a>
        <a href="expenses.html" class="nav-item active" data-i18n-key="nav_expenses" data-i18n-ar="المصاريف">📋
          Expenses</a>
        <a href="admin.html" class="nav-item" data-i18n-key="nav_admin" data-i18n-ar="لوحة التحكم">⚙️ Admin Panel</a>
        <a href="backup.html" class="nav-item" data-i18n-key="nav_backup" data-i18n-ar="النسخ الاحتياطي">💾 Backup</a>


      </nav>

      <div class="sidebar-footer">Tashgheel POS</div>
    </aside>

    <div class="container">
      <h1 data-i18n-key="expenses" data-i18n-ar="المصاريف">📋 Expenses</h1>

      <div class="form-section">
        <label data-i18n-key="date" data-i18n-ar="التاريخ">Date:</label>
        <input type="date" id="expenseDate">

        <label data-i18n-key="seller" data-i18n-ar="البائع">Seller:</label>
        <select id="expenseSeller"></select>

        <label data-i18n-key="description" data-i18n-ar="الوصف">Description:</label>
        <input type="text" id="expenseDesc" placeholder="e.g. Paper, Delivery...">

        <label data-i18n-key="amount" data-i18n-ar="المبلغ">Amount:</label>
        <input type="number" id="expenseAmount" step="0.01" placeholder="0.00">

        <label data-i18n-key="method" data-i18n-ar="طريقة الدفع">Payment Method:</label>
        <select id="expenseMethod">
          <option value="cash" data-i18n-key="cash" data-i18n-ar="نقدي">Cash</option>
          <option value="card" data-i18n-key="card" data-i18n-ar="بطاقة">Card</option>
          <option value="mobile" data-i18n-key="mobile" data-i18n-ar="موبايل">Mobile</option>
        </select>

        <button onclick="addExpense()" data-i18n-key="add_expense" data-i18n-ar="إضافة مصروف">➕ Add Expense</button>
      </div>

      <hr>

      <div class="filter-section">
        <label data-i18n-key="filter_date" data-i18n-ar="تاريخ الفلترة">Date:</label>
        <input type="date" id="filterDate">
        <label data-i18n-key="filter_seller" data-i18n-ar="بائع الفلترة">Seller:</label>
        <select id="filterSeller"></select>
        <button onclick="filterExpenses()" data-i18n-key="filter" data-i18n-ar="فلترة">🔍 Filter</button>
        <button onclick="resetFilter()" data-i18n-key="reset" data-i18n-ar="إعادة تعيين">🔄 Reset</button>
      </div>

      <table>
        <thead>
          <tr>
            <th>#</th>
            <th data-i18n-key="date" data-i18n-ar="التاريخ">Date</th>
            <th data-i18n-key="seller" data-i18n-ar="البائع">Seller</th>
            <th data-i18n-key="description" data-i18n-ar="الوصف">Description</th>
            <th data-i18n-key="amount" data-i18n-ar="المبلغ">Amount</th>
            <th data-i18n-key="method" data-i18n-ar="الدفع">Method</th>
            <th data-i18n-key="actions" data-i18n-ar="الإجراءات">Actions</th>
          </tr>
        </thead>
        <tbody id="expensesTableBody">
          <!-- Filled by JS -->
        </tbody>
      </table>

      <p id="totalExpenses" class="total-label">💰 Total: 0</p>
    </div>
  </div>
</body>
<!-- أضف في نهاية الصفحة قبل </body> -->

<script>
  // expenses-app.js handles functionality
  // translations.js handles language
</script>

</html>
